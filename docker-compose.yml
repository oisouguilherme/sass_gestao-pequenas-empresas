services:
  postgres:
    image: postgres:16-alpine
    container_name: gestao_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gestao_dev
    ports:
      - "5432:5432"
    volumes:
      - gestao_pgdata:/var/lib/postgresql/data

volumes:
  gestao_pgdata:
